<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Us Machina &mdash; Memories &hearts;</title>
  <meta name="description" content="Our shared memory wall -- upload and browse our favourite moments." />
</head>
<body>

  <!-- ═══ NAVBAR ═══ -->
  <nav class="site-nav" id="siteNav">
    <a href="./index.html" class="nav-brand">&hearts; Us Machina</a>
    <a href="./index.html" class="nav-link">Home</a>
    <a href="./timeline.html" class="nav-link">Timeline</a>
    <a href="./memories.html" class="nav-link">Memories</a>
    <button class="theme-toggle" aria-label="Toggle theme">&#x1F319;</button>
  </nav>

  <div class="memories-page">
    <!-- Header -->
    <div class="memories-header">
      <h1>Our Memories</h1>
      <div class="memories-header-actions">
        <button class="upload-btn" id="uploadToggle">+ Add Memory</button>
      </div>
    </div>

    <!-- Upload Panel -->
    <div class="upload-panel" id="uploadPanel">
      <div class="upload-drop-zone" id="dropZone">
        <span class="drop-icon">&#x1F4F7;</span>
        <p>Tap to select photos or drag & drop</p>
      </div>
      <input type="file" id="fileInput" accept="image/*" multiple hidden />
      <div class="upload-preview-list" id="previewList"></div>
      <div class="upload-progress" id="uploadProgress">
        <div class="upload-progress-bar" id="progressBar"></div>
      </div>
      <p class="upload-status" id="uploadStatus"></p>
      <div class="upload-actions">
        <button class="upload-cancel" id="uploadCancel">Cancel</button>
        <button class="upload-submit" id="uploadSubmit" disabled>Upload</button>
      </div>
    </div>

    <!-- Gallery Grid -->
    <div class="memories-grid" id="memoriesGrid"></div>
    <div class="memories-empty" id="memoriesEmpty" style="display:none">
      No memories yet -- be the first to add one!
    </div>
  </div>

  <!-- Lightbox -->
  <div class="lightbox" id="lightbox">
    <button class="lightbox-close" id="lightbox-close" aria-label="Close">&times;</button>
    <img id="lightbox-img" src="" alt="" />
    <p class="lightbox-caption" id="lightbox-caption"></p>
  </div>

  <script type="module" src="/src/memories.js"></script>
</body>
</html>
